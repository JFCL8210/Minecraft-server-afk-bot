steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: 安裝瀏覽器環境
        run: |
          pip install playwright
          playwright install chromium
      - name: 執行模擬瀏覽器續期
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
        run: python renew.py
