name: JLMTR_Final_Guard
on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

jobs:
  browser_run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 複製代碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 極速安裝環境
        run: |
          pip install playwright playwright-stealth
          # 僅安裝核心 Chromium，跳過所有不必要的依賴檢查
          python -m playwright install chromium

      - name: 執行 JLMTR 隱身續期
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
        run: python renew.py
