name: JLMTR_Turbo_Guard
on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

jobs:
  browser_run:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 設定 10 分鐘強制結束，防止卡死
    steps:
      - name: 複製代碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 快速安裝環境
        run: |
          pip install playwright
          # 只裝 chromium，且不檢查系統依賴(已包含在 ubuntu-latest)
          playwright install chromium

      - name: 執行 JLMTR 續期
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
        run: python renew.py
